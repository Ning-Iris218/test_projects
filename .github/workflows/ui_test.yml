name: UI Automated Test

on:
  push:
    branches:["main","master"]

jobs:
  test:
    runs-on:ubuntu-latest

steps:
  - name: 1.拉取代码
    uses: actions/checkout@v3

  - name: 2.配置python环境
    uses: actions/setup-python@v4
    with:
      python-version:'3.13'

  - name: 3.安装依赖包
    run: |
      python -m pip install --upgrade pip
      pip install -r Project1/requirements.txt

  - name: 4.运行自动化测试
    run: |
      pytest Project1/test_case2.py -s -alluredir=./allure-results

  - name: 5.存档测试报告
    uses: actions/upload-artifact@v3
    if: always()
    with:
      name: allure_results
      path: ./allure-results